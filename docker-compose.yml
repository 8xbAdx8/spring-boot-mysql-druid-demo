services:
  mysql:
    image: mysql:8.0
    container_name: druid-demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: druid_demo
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - druid-demo-mysql-data:/var/lib/mysql

volumes:
  druid-demo-mysql-data:
