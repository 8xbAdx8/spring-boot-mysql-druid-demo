server:
  port: 8080

spring:
  application:
    name: spring-boot-mysql-druid-demo
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  sql:
    init:
      mode: always
      encoding: UTF-8
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:druid_demo}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000;druid.stat.logSlowSql=true;druid.wall.config.multiStatementAllow=false
      remove-abandoned: false
      remove-abandoned-timeout: 180
      log-abandoned: true
      filter:
        stat:
          enabled: true
          db-type: mysql
          merge-sql: true
          log-slow-sql: true
          slow-sql-millis: 1000
        wall:
          enabled: true
          db-type: mysql
          config:
            multi-statement-allow: false
            none-base-statement-allow: false
            delete-where-none-check: true
            update-where-none-check: true
        slf4j:
          enabled: true
          statement-executable-sql-log-enable: true
          statement-log-enabled: true
          result-set-log-enabled: false

druid:
  monitor:
    stat-view-servlet:
      enabled: true
      url-pattern: /druid/*
      login-username: ${DRUID_USERNAME:admin}
      login-password: ${DRUID_PASSWORD:admin123}
      reset-enable: false
      allow: ${DRUID_ALLOW:}
      deny:
    web-stat-filter:
      enabled: true
      url-pattern: /*
      exclusions: "*.js,*.gif,*.jpg,*.jpeg,*.png,*.css,*.ico,/druid/*"
      session-stat-enable: true
      session-stat-max-count: 1000
      principal-session-name: username
      principal-cookie-name: username
      profile-enable: true

logging:
  level:
    druid.sql.Statement: info
    com.alibaba.druid: info
